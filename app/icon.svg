<?xml version="1.0" encoding="UTF-8"?>
<!--
  Favicon — square monogram for BestLooking.Skin.
  Brand-blue rounded square background with a white "B" centered, plus a
  small red dot accent that mirrors the wordmark's red accent on "— SKIN".
  Designed to stay legible from 16x16 up to 512x512.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  role="img"
  aria-label="BestLooking.Skin"
>
  <rect width="64" height="64" rx="12" ry="12" fill="#014fd3" />
  <text
    x="50%"
    y="54%"
    font-family="'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
    font-weight="800"
    font-size="42"
    fill="#ffffff"
    text-anchor="middle"
    dominant-baseline="middle"
    letter-spacing="-1"
  >B</text>
  <circle cx="49" cy="48" r="4.5" fill="#e33333" />
</svg>
