<?xml version="1.0" encoding="UTF-8"?>
<!--
  BestLooking.Skin — pure wordmark.

  "BESTLOOKING" on top in Outfit Bold (currentColor — flips with parent
  text color). "— SKIN" right-aligned underneath in primary red, tracked
  uppercase. Both wordmarks share the same right edge so the N of SKIN
  lines up directly under the G of BESTLOOKING.
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 320 100"
  role="img"
  aria-label="BestLooking.Skin"
  preserveAspectRatio="xMinYMid meet"
>
  <style>
    .top { font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
           font-weight: 700; font-size: 40px; letter-spacing: 1.2px; }
    .bot { font-family: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
           font-weight: 600; font-size: 20px; letter-spacing: 4px; }
  </style>

  <!-- "BESTLOOKING" — top row, right-edge at x=310. textLength locks the
       rendered width so the B doesn't clip when fallback fonts are used. -->
  <text
    x="310"
    y="52"
    class="top"
    fill="currentColor"
    text-anchor="end"
    textLength="290"
    lengthAdjust="spacingAndGlyphs"
  >BESTLOOKING</text>

  <!-- "— SKIN" — bottom row, also right-aligned to x=310 -->
  <g transform="translate(310, 72)">
    <line x1="-130" y1="0" x2="-100" y2="0" stroke="#e33333" stroke-width="1.6" stroke-linecap="round"/>
    <text x="0" y="5" class="bot" fill="#e33333" text-anchor="end">SKIN</text>
  </g>
</svg>
